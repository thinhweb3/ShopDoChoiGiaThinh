<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="dynamic(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị - Gia Thịnh Shop</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/gia-thinh-favicon.svg}">
    <link rel="shortcut icon" th:href="@{/images/gia-thinh-favicon.svg}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>

    <div id="wrapper">
        <div id="sidebar-wrapper">
            <div class="sidebar-brand">
                <a href="/"><img th:src="@{/images/gia-thinh-favicon.svg}" alt="Gia Thịnh Shop" class="admin-brand-logo"></a>
            </div>

            <div class="list-group list-group-flush mt-3 w-100 d-flex flex-column align-items-center">
                <a href="/admin/dashboard" class="list-group-item active"
                   data-bs-toggle="tooltip" data-bs-placement="right" title="Tổng quan">
                    <i class="fas fa-chart-pie"></i>
                </a>
                <a href="/admin/products" class="list-group-item"
                   data-bs-toggle="tooltip" data-bs-placement="right" title="Quản lý đồ chơi">
                    <i class="fas fa-box"></i>
                </a>
                <a href="/admin/categories" class="list-group-item"
                   data-bs-toggle="tooltip" data-bs-placement="right" title="Danh mục">
                    <i class="fas fa-layer-group"></i>
                </a>
                <a href="/admin/types" class="list-group-item"
                   data-bs-toggle="tooltip" data-bs-placement="right" title="Loại đồ chơi">
                    <i class="fas fa-tags"></i>
                </a>
                <a href="/admin/orders" class="list-group-item"
                   data-bs-toggle="tooltip" data-bs-placement="right" title="Quản lý đơn hàng">
                    <i class="fas fa-truck"></i>
                </a>
                <a href="/admin/logout" class="list-group-item mt-auto text-danger"
                   data-bs-toggle="tooltip" data-bs-placement="right" title="Đăng xuất quản trị">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </div>

        <div id="page-content-wrapper">
            <nav class="navbar navbar-admin d-flex justify-content-between align-items-center">
                <div>
                    <h3 class="page-title m-0">Quản trị Gia Thịnh Shop</h3>
                    <small class="text-muted">Danh mục đồ chơi và xử lý đơn giao hàng</small>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="text-end d-none d-md-block" style="line-height: 1.2;">
                        <span class="d-block fw-bold small text-dark" th:text="${session.user != null ? session.user.hoTen : 'Quản trị viên'}">Quản trị viên</span>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Quan%20Tri%20Vien&background=0f67b1&color=fff" class="avatar shadow-sm">
                </div>
            </nav>

            <div th:replace="${content}"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
            tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl)
            })
        });
    </script>
</body>
</html>
