<div xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/_layout :: dynamic(~{::main})}">
    <main>
        <div class="text-center py-5">
            <i class="fas fa-check-circle text-success" style="font-size: 80px;"></i>
            <h2 class="fw-bold mt-4">ĐẶT HÀNG THÀNH CÔNG!</h2>
            <p class="text-muted">Cảm ơn bạn đã mua hàng. Chúng tôi sẽ liên hệ sớm nhất.</p>
            <div th:if="${order != null}" class="card border-0 shadow-sm rounded-4 d-inline-block text-start mt-3">
                <div class="card-body px-4 py-3">
                    <div class="small text-muted">Mã đơn hàng</div>
                    <div class="fw-bold fs-4 text-main" th:text="'#' + ${order.maDonHang}">#0</div>
                    <div class="small text-muted mt-2">Người nhận</div>
                    <div class="fw-semibold" th:text="${order.tenNguoiNhan != null ? order.tenNguoiNhan : (order.taiKhoan != null ? order.taiKhoan.hoTen : 'Khách hàng')}">Khách hàng</div>
                    <div class="small text-muted mt-2">Số điện thoại</div>
                    <div class="fw-semibold" th:text="${order.soDienThoaiNhan != null ? order.soDienThoaiNhan : (order.taiKhoan != null ? order.taiKhoan.soDienThoai : 'Chưa cập nhật')}">0900000000</div>
                </div>
            </div>
            <div th:if="${paymentSuccess}" class="alert alert-success border-0 rounded-4 d-inline-block mt-3 px-4" role="alert">
                <span th:text="${paymentSuccess}"></span>
            </div>
            <a href="/home/index" class="btn btn-outline-success">Về trang chủ</a>
        </div>
    </main>
</div>
