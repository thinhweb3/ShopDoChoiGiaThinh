spring.application.name=ASM
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/webmohinh2}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:2}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:20}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:2}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:100}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:20}
server.tomcat.processor-cache=${SERVER_TOMCAT_PROCESSOR_CACHE:10}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}

spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

order.shipping-fee=${ORDER_SHIPPING_FEE:0}

payment.qr.bank-id=${PAYMENT_QR_BANK_ID:970454}
payment.qr.account=${PAYMENT_QR_ACCOUNT:}
payment.qr.acq-name=${PAYMENT_QR_ACQ_NAME:}
payment.qr.template=${PAYMENT_QR_TEMPLATE:compact2}

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}
server.tomcat.max-part-count=${SERVER_TOMCAT_MAX_PART_COUNT:100}

app.storage.upload-root=${APP_STORAGE_UPLOAD_ROOT:./data/uploads}

store.contact.name=${STORE_CONTACT_NAME:Gia Thinh Shop}
store.contact.phone=${STORE_CONTACT_PHONE:0900000000}
store.contact.zalo=${STORE_CONTACT_ZALO:0900000000}
