<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/admin_layout :: dynamic(~{::body})}">
<body>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark m-0">Quản lý Hãng sản xuất</h3>
            <button th:if="${session.user != null and session.user.hasPermission('MANUFACTURER_CREATE')}"
                    class="btn btn-primary" onclick="openModal(null)">
                <i class="fas fa-plus me-2"></i> Thêm hãng mới
            </button>
        </div>

        <div th:if="${message != null}" 
             th:class="${'alert alert-dismissible fade show ' + (messageType == 'success' ? 'alert-success' : 'alert-danger')}" 
             role="alert">
            <i class="fas" th:classappend="${messageType == 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i>
            <span th:text="${message}">Thông báo</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-secondary">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Tên Hãng</th>
                                <th>Website</th>
                                <th>Mô tả</th>
                                <th class="text-end pe-4">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="h : ${manufacturers}">
                                <td class="ps-4 fw-bold text-muted" th:text="${h.maHang}">1</td>
                                
                                <td class="fw-bold text-primary" th:text="${h.tenHang}">Bandai</td>
                                
                                <td>
                                    <a th:if="${h.website != null and h.website != ''}" 
                                       th:href="${h.website}" target="_blank" class="text-decoration-none small">
                                        <i class="fas fa-external-link-alt me-1"></i> Truy cập
                                    </a>
                                    <span th:if="${h.website == null or h.website == ''}" class="text-muted small">-</span>
                                </td>

                                <td class="text-muted small text-truncate" style="max-width: 250px;" th:text="${h.moTa}">Mô tả...</td>

                                <td class="text-end pe-4">
                                    <button th:if="${session.user != null and session.user.hasPermission('MANUFACTURER_UPDATE')}"
                                            class="btn btn-sm btn-light border me-1" 
                                            th:onclick="'openModal(' + ${h.maHang} + ')'" title="Sửa">
                                        <i class="fas fa-pen text-primary"></i>
                                    </button>
                                    
                                    <a th:if="${session.user != null and session.user.hasPermission('MANUFACTURER_DELETE')}"
                                       th:href="@{|/admin/manufacturers/delete/${h.maHang}|}" 
                                       class="btn btn-sm btn-light border text-danger"
                                       onclick="return confirm('Bạn có chắc muốn xóa hãng này không? Dữ liệu đồ chơi sẽ bị ảnh hưởng!');">
                                        <i class="fas fa-trash-alt"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div th:if="${#lists.isEmpty(manufacturers)}" class="text-center py-5">
                    <p class="text-muted">Chưa có dữ liệu hãng sản xuất.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="manuModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form action="/admin/manufacturers/save" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">Thêm hãng mới</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="maHang" name="maHang">

                        <div class="mb-3">
                            <label class="form-label">Tên Hãng <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="tenHang" name="tenHang" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Website</label>
                            <input type="text" class="form-control" id="website" name="website" placeholder="https://...">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" id="moTa" name="moTa" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button th:if="${session.user != null and (session.user.hasPermission('MANUFACTURER_CREATE') or session.user.hasPermission('MANUFACTURER_UPDATE'))}"
                                type="submit" class="btn btn-primary">Lưu thông tin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) {
            var myModal = new bootstrap.Modal(document.getElementById('manuModal'));
            
            if (id) {

                document.getElementById('modalTitle').innerText = 'Cập nhật Hãng';

                fetch('/admin/manufacturers/api/' + id)
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('maHang').value = data.maHang;
                        document.getElementById('tenHang').value = data.tenHang;
                        document.getElementById('website').value = data.website;
                        document.getElementById('moTa').value = data.moTa;
                        myModal.show();
                    })
                    .catch(error => alert('Lỗi tải dữ liệu!'));
            } else {
                document.getElementById('modalTitle').innerText = 'Thêm hãng mới';
                document.getElementById('maHang').value = '';
                document.querySelector('form').reset();
                myModal.show();
            }
        }
    </script>

</body>
</html>
