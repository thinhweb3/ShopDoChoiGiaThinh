<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/_layout :: dynamic(~{::main})}">
<body>
    <main>
        <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg">
                    <div class="card-header bg-white text-center py-4">
                        <h3 class="fw-bold text-uppercase text-main">Quên Mật Khẩu</h3>
                        <p class="text-muted small m-0">Nhập thông tin để nhận lại tài khoản qua email</p>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${message != null}"
                             th:class="${'alert text-center ' + (messageType == 'success' ? 'alert-success' : 'alert-danger')}">
                            <span th:text="${message}"></span>
                        </div>

                        <form action="/account/forgot-password" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên đăng nhập</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" name="username" placeholder="Nhập tên đăng nhập..." required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Địa chỉ email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" class="form-control border-start-0" name="email" placeholder="Nhập email đăng ký..." required>
                                </div>
                            </div>

                            <button class="btn btn-main w-100 py-2 fw-bold text-white shadow-sm" type="submit">
                                GỬI VỀ EMAIL
                            </button>
                        </form>
                    </div>
                    <div class="card-footer bg-light text-center py-3">
                        <a href="/auth/login" class="text-decoration-none fw-bold text-main">Quay lại đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
