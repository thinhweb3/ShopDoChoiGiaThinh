<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập quản trị</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/gia-thinh-favicon.svg(v=2)}">
    <link rel="shortcut icon" th:href="@{/images/gia-thinh-favicon.svg(v=2)}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 181, 31, 0.22), transparent 35%),
                radial-gradient(circle at bottom right, rgba(19, 153, 207, 0.18), transparent 28%),
                #ecf9fe;
        }

        .login-shell {
            min-height: 100vh;
        }

        .login-card {
            border: 0;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(15, 35, 65, 0.14);
        }

        .brand-badge {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #cceefa;
            box-shadow: 0 12px 24px rgba(138, 53, 15, 0.16);
            overflow: hidden;
        }

        .brand-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <main class="container login-shell d-flex align-items-center justify-content-center py-5">
        <div class="col-xl-4 col-lg-5 col-md-7">
            <div class="login-card bg-white p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="brand-badge mx-auto mb-3">
                        <img th:src="@{/images/gia-thinh-favicon.svg(v=2)}" alt="Gia Thịnh Shop">
                    </div>
                    <h3 class="fw-bold mb-1">Đăng nhập quản trị</h3>
                    <p class="text-muted mb-0">Danh mục đồ chơi, tồn kho và đơn giao hàng.</p>
                </div>

                <div th:if="${message != null}" class="alert alert-danger text-center">
                    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${message}"></span>
                </div>
                <div th:if="${successMessage != null}" class="alert alert-success text-center">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
                </div>
                <div th:if="${infoMessage != null}" class="alert alert-info text-center">
                    <i class="fas fa-circle-info me-2"></i><span th:text="${infoMessage}"></span>
                </div>

                <form action="/admin/login" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" class="form-control" name="username" placeholder="Nhập tài khoản admin" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control" name="password" placeholder="Nhập mật khẩu" required>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100 py-2 fw-bold">
                        <i class="fas fa-right-to-bracket me-2"></i>Vào trang quản trị
                    </button>
                </form>

                <div class="small text-muted text-center mt-4">
                    Khách mua lẻ có thể thêm giỏ hàng và đặt mua trực tiếp trên website mà không cần đăng nhập.
                </div>
            </div>
        </div>
    </main>
</body>
</html>
