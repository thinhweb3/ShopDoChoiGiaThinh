<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/_layout :: dynamic(~{::main})}">
<body>
    <main>
        <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg">
                    <div class="card-header bg-white text-center py-4">
                        <h3 class="fw-bold text-uppercase text-main">Đăng Ký</h3>
                        <p class="text-muted small m-0">Tạo tài khoản để săn đồ chơi nhập khẩu và quà tặng hot trend</p>
                    </div>
                    <div class="card-body p-4">
                        
                        <div th:if="${message != null}" class="alert alert-warning text-center">
                            <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${message}"></span>
                        </div>

                        <form action="/account/sign-up" method="post">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Họ và tên</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-id-card text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" name="fullname" placeholder="Nhập họ và tên..." required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Địa chỉ email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" class="form-control border-start-0" name="email" placeholder="Nhập địa chỉ email..." required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên đăng nhập</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" name="username" placeholder="Chọn tên đăng nhập..." required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0" name="password" placeholder="Nhập mật khẩu..." required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Xác nhận mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-check-circle text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0" name="confirmPassword" placeholder="Nhập lại mật khẩu..." required>
                                </div>
                            </div>

                            <button class="btn btn-main w-100 py-2 fw-bold text-white shadow-sm">ĐĂNG KÝ NGAY</button>
                        </form>
                    </div>
                    <div class="card-footer bg-light text-center py-3">
                        <span class="small text-muted">Đã có tài khoản?</span>
                        <a href="/auth/login" class="text-decoration-none fw-bold text-main ms-1">Đăng nhập</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
