<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/_layout :: dynamic(~{::main})}">
<body>
    <main>
        <div class="container py-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-uppercase text-main border-start border-5 border-success ps-3">
                    Danh sách yêu thích
                </h3>
                <a href="/home/index" class="btn btn-outline-secondary rounded-pill btn-sm">
                    <i class="fas fa-arrow-left me-1"></i> Tiếp tục xem hàng
                </a>
            </div>

            <div th:if="${favorites == null or #lists.isEmpty(favorites)}" class="text-center py-5 bg-light rounded shadow-sm">
                <i class="far fa-heart fa-4x text-muted mb-3"></i>
                <p class="text-muted fs-5">Bạn chưa lưu đồ chơi nào!</p>
                <a href="/home/index" class="btn btn-main text-white mt-2">Khám phá ngay</a>
            </div>

            <div th:unless="${favorites == null or #lists.isEmpty(favorites)}" class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-secondary">
                                <tr>
                                    <th class="ps-4 py-3">Đồ chơi</th>
                                    <th class="text-center">Giá tham khảo</th>
                                    <th class="text-center">Trạng thái</th>
                                    <th class="text-end pe-4">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="fav : ${favorites}">
                                    <td class="ps-4">
                                        <div class="d-flex align-items-center">
                                            <a th:href="@{|/product/detail/${fav.moHinh.maMoHinh}|}">
                                                <img th:src="${@assetUrlService.product(fav.moHinh.hinhAnh)}" 
                                                     class="rounded border me-3" 
                                                     style="width: 70px; height: 70px; object-fit: cover;"
                                                     onerror="this.src='https://via.placeholder.com/70'">
                                            </a>
                                            <div>
                                                <h6 class="mb-1">
                                                    <a th:href="@{|/product/detail/${fav.moHinh.maMoHinh}|}" 
                                                       class="text-decoration-none text-dark fw-bold hover-main"
                                                       th:text="${fav.moHinh.tenMoHinh}">Tên đồ chơi</a>
                                                </h6>
                                                <small class="text-muted" th:text="${fav.moHinh.maMoHinh}"></small>
                                            </div>
                                        </div>
                                    </td>
                                    
                                    <td class="text-center fw-bold text-danger">
                                        <span th:if="${@productService.getMinPrice(fav.moHinh) != null}"
                                              th:text="${#numbers.formatDecimal(@productService.getMinPrice(fav.moHinh), 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                        </span>
                                        <span th:if="${@productService.getMinPrice(fav.moHinh) == null}" class="text-muted small">Liên hệ</span>
                                    </td>

                                    <td class="text-center">
                                        <span th:if="${@productService.isOrderable(fav.moHinh)}" class="badge bg-success bg-opacity-75">Còn hàng</span>
                                        <span th:unless="${@productService.isOrderable(fav.moHinh)}" class="badge bg-secondary">Tạm hết hàng</span>
                                    </td>

                                    <td class="text-end pe-4">
                                        <a th:href="@{|/product/detail/${fav.moHinh.maMoHinh}|}" 
                                           class="btn btn-sm btn-main rounded-pill px-3 me-1">
                                            <i class="fas fa-shopping-cart"></i> Mua
                                        </a>
                                        <a th:href="@{|/favorite/remove/${fav.moHinh.maMoHinh}|}" 
                                           class="btn btn-sm btn-outline-danger rounded-circle" 
                                           title="Xóa"
                                           onclick="return confirm('Bỏ món đồ chơi này khỏi danh sách lưu?')">
                                            <i class="fas fa-trash-alt"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
