<div xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/_layout :: dynamic(~{::main})}">
    <main>
        <div class="text-center py-5">
            <i class="fas fa-check-circle text-success" style="font-size: 80px;"></i>
            <h2 class="fw-bold mt-4">ĐẶT HÀNG THÀNH CÔNG!</h2>
            <p class="text-muted">Cảm ơn bạn đã mua hàng. Chúng tôi sẽ liên hệ sớm nhất.</p>
            <div th:if="${paymentSuccess}" class="alert alert-success border-0 rounded-4 d-inline-block mt-3 px-4" role="alert">
                <span th:text="${paymentSuccess}"></span>
            </div>
            <a href="/home/index" class="btn btn-outline-success">Về trang chủ</a>
        </div>
    </main>
</div>
